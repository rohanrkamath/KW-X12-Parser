# Build and publish to PyPI when you create a release or push a version tag.
# Setup: https://docs.pypi.org/trusted-publishers/ (recommended) or use PYPI_API_TOKEN secret.

name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for PyPI Trusted Publisher (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      # Option A: PyPI Trusted Publisher (no secrets). Add this repo in PyPI under
      # Your project → Publishing → Add a new pending publisher (owner, repo, workflow name, environment).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # Option B: If not using Trusted Publisher, comment out the step above and use this instead:
      # - name: Publish to PyPI
      #   env:
      #     TWINE_USERNAME: __token__
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      #   run: pip install twine && twine upload dist/*
