# Build and publish to PyPI when you create a release or push a version tag.
# Setup: https://docs.pypi.org/trusted-publishers/ (recommended) or use PYPI_API_TOKEN secret.

name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      # Publish using API token. Add secret PYPI_API_TOKEN in repo Settings → Secrets.
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: pip install twine && twine upload dist/*
