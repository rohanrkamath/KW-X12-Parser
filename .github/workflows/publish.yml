name: Publish to PyPI

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      # Uses PYPI_API_TOKEN secret only (not Trusted Publishing). Add it in Settings → Secrets.
      - name: Publish to PyPI (twine)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        # --skip-existing: avoid failure when the same version was already uploaded
        # (e.g. workflow triggered twice for one tag, or manual re-run after success).
        run: pip install twine && twine upload dist/* --skip-existing
